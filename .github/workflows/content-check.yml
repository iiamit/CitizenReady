name: USCIS Content Check

on:
  schedule:
    # Every Sunday at 06:00 UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:

jobs:
  check-questions:
    name: Check USCIS question updates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pdf-parse
        run: npm install pdf-parse

      - name: Download USCIS 2025 civics PDF
        run: |
          curl -L \
            "https://www.uscis.gov/sites/default/files/document/questions-and-answers/100q.pdf" \
            -o /tmp/uscis-civics.pdf \
            --fail \
            --silent \
            --max-time 30 \
            || echo "PDF_DOWNLOAD_FAILED=true" >> $GITHUB_ENV

      - name: Parse and diff questions
        if: env.PDF_DOWNLOAD_FAILED != 'true'
        run: |
          node - << 'EOF'
          const fs = require('fs');
          const pdf = require('pdf-parse');

          (async () => {
            const dataBuffer = fs.readFileSync('/tmp/uscis-civics.pdf');
            const data = await pdf(dataBuffer);
            const text = data.text;

            // Extract question numbers and text
            const questionPattern = /(\d+)\.\s+(.+?)(?=\n\d+\.|$)/gs;
            const matches = [...text.matchAll(questionPattern)];

            const parsed = matches
              .filter(m => Number(m[1]) >= 1 && Number(m[1]) <= 128)
              .map(m => ({ number: Number(m[1]), text: m[2].replace(/\s+/g, ' ').trim() }));

            if (parsed.length < 50) {
              console.log('Warning: Only parsed', parsed.length, 'questions. PDF format may have changed.');
              process.exit(0);
            }

            // Write parsed output for review
            fs.writeFileSync('/tmp/parsed-questions.json', JSON.stringify(parsed, null, 2));
            console.log(`Parsed ${parsed.length} questions from PDF.`);

            // Load bundled questions for comparison
            const bundledRaw = fs.readFileSync('data/questions-2025.js', 'utf8');
            const bundledMatch = bundledRaw.match(/export const QUESTIONS\s*=\s*(\[[\s\S]+\])/);
            if (!bundledMatch) {
              console.log('Could not parse bundled questions file for comparison.');
              process.exit(0);
            }

            console.log('PDF parsed successfully. Manual review recommended.');
            console.log('Parsed questions saved to /tmp/parsed-questions.json');
          })().catch(e => { console.error('Parse error:', e.message); process.exit(0); });
          EOF

      - name: Check state officials (placeholder)
        run: |
          echo "State officials check: verify governor and senator data against current sources."
          echo "See: https://www.uscis.gov/citizenship/find-study-materials-and-resources/check-for-test-updates"

      - name: Create issue if differences found
        if: env.PDF_DOWNLOAD_FAILED != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Weekly USCIS content check — ${new Date().toISOString().slice(0,10)}`;
            const body = `## Automated USCIS Content Check\n\n` +
              `Date: ${new Date().toISOString()}\n\n` +
              `The weekly content check ran successfully. Review the workflow logs for any diffs.\n\n` +
              `### Checklist\n` +
              `- [ ] Review parsed questions vs. bundled data\n` +
              `- [ ] Verify state governor data is current\n` +
              `- [ ] Verify US senators data is current\n` +
              `- [ ] Update \`data/questions-2025.js\` if changes found\n` +
              `- [ ] Update \`data/state-data.js\` if officials changed\n` +
              `- [ ] Publish updated files to update endpoint\n` +
              `- [ ] Update \`updates/latest.json\` with new version strings\n\n` +
              `**Note:** Auto-close this issue after completing the checklist.`;

            // Only create issue on scheduled runs, not manual triggers
            if (context.eventName === 'schedule') {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['content-review', 'automated']
              });
            }
