<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CitizenReady — US Naturalization Test Prep</title>
  <meta name="description" content="Prepare for the US naturalization civics test with personalized lessons and spaced-repetition flashcards.">

  <!-- PWA / Mobile -->
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#1A3A5C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CitizenReady">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">

  <!-- Critical CSS inlined for fast first paint -->
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Source Sans 3',system-ui,sans-serif;background:#F5F5F5;color:#444;min-height:100vh}
    #app-root{min-height:100vh;display:flex;flex-direction:column}
    .loading-shell{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px}
    .loading-shell .logo{font-size:28px;font-weight:700;color:#1A3A5C;letter-spacing:-0.5px}
    .loading-shell .tagline{font-size:15px;color:#666;letter-spacing:0.02em}
    .spinner{width:32px;height:32px;border:3px solid #E8E8E8;border-top-color:#1A3A5C;border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Main stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app-root">
    <div class="loading-shell" id="loading-shell">
      <div class="logo">CitizenReady</div>
      <div class="spinner"></div>
      <div class="tagline">Learn. Drill. Pass.</div>
    </div>
  </div>

  <!-- App entry point (idb now loaded via npm in app.js) -->
  <script type="module" src="app.js"></script>
</body>
</html>
